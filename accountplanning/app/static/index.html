<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoleap · IQ-EQ Account Planning</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@600;700;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #3C8943;
            --brand-blue: #1D4ED8;
            --status-executing: #FACC15;
            --status-completed: #22C55E;
            --bg-light: #F9FAFB;
            --border-color: #E5E7EB;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px rgba(250, 204, 21, 0.4)); opacity: 1; }
            50% { filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.8)); opacity: 0.9; }
            100% { filter: drop-shadow(0 0 5px rgba(250, 204, 21, 0.4)); opacity: 1; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: #111827; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .hdr { background: #FFFFFF; padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); z-index: 20; }
        .hdr-l { display: flex; align-items: center; gap: 20px; }
        .logo { height: 32px; width: auto; }
        .hdr-t { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; color: #111827; }

        main { display: flex; flex: 1; overflow: hidden; }
        .canvas-container { flex: 1; min-width: 0; padding: 20px; display: flex; justify-content: center; align-items: center; background: #F8F9FB; }
        svg.mesh { width: 100%; max-width: 900px; height: auto; overflow: visible; }

        .data-pane { flex: 1; min-width: 0; background: #FFF; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .tabs { display: flex; background: #FFF; border-bottom: 2px solid #F3F4F6; }
        .tab { flex: 1; text-align: center; padding: 14px 0; font-size: 11px; font-weight: 800; cursor: pointer; color: #9CA3AF; border-bottom: 2px solid transparent; letter-spacing: 0.5px; }
        .tab.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); }
        .pane-content { display: none; height: calc(100vh - 80px); overflow-y: scroll; padding: 24px; }
        .pane-content.active { display: flex; flex-direction: column; }

        /* --- Planning Results --- */
        .plan-card { background: #FFF; border: 1.5px solid #F3F4F6; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .acc-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 15px; color: var(--brand-primary); }
        
        .section-hdr { font-size: 10px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; margin-top: 20px; }
        .brief-box { background: #F8F9FB; padding: 16px; border-radius: 8px; font-size: 13px; color: #4B5563; line-height: 1.6; }
        
        .obj-pill { background: #EFF6FF; border: 1px solid #DBEAFE; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .obj-t { font-weight: 700; font-size: 13px; color: var(--brand-blue); margin-bottom: 4px; }
        .obj-r { font-size: 11.5px; color: #6B7280; font-style: italic; }

        .agenda-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
        .step-num { width: 22px; height: 22px; background: var(--brand-primary); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
        .step-topic { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
        .step-q { font-size: 12px; color: #6B7280; }

        /* --- Agent Logs --- */
        .trace-card { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #F3F4F6; }
        .trace-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .trace-status { width: 8px; height: 8px; border-radius: 50%; background: #D1D5DB; }
        .trace-status.active { background: var(--status-executing); }
        .trace-status.done { background: var(--status-completed); }
        .trace-agent { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: #374151; background: #F3F4F6; padding: 3px 8px; border-radius: 4px; }
        .trace-desc { font-size: 13.5px; color: #4B5563; line-height: 1.5; }

        /* --- SVG Mesh --- */
        .ag { transition: 0.4s; }
        .ag-active rect { fill: var(--status-executing) !important; animation: pulse-glow 1.5s infinite; }
        .ag-completed rect { fill: var(--status-completed) !important; }
        .ag-active text, .ag-completed text { fill: #FFF !important; font-weight: 800; }
        .path-line { stroke: #E5E7EB; stroke-width: 1.5; fill: none; }
        .path-on { stroke: var(--brand-primary); stroke-width: 2; }
    </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l"><img src="/static/assets/Algoleap_logo.png" alt="Algoleap" class="logo"><div style="width:1px;height:24px;background:#E5E7EB"></div><div class="hdr-t">Account Planning Mesh</div></div>
  <button class="btn on" style="padding: 8px 24px; background: var(--brand-primary); color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer;" onclick="start()">Run Planning</button>
</div>

<main>
    <div class="canvas-container">
        <svg class="mesh" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arr-on" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M1 1.5L8.5 5L1 8.5" fill="none" stroke="#3C8943" stroke-width="1.6"/></marker>
            </defs>

            <!-- Orchestrator -->
            <g id="ag-orch" class="ag" style="transform:translate(200px, 20px)">
                <rect width="600" height="60" rx="12" fill="#FFF" stroke="#E5E7EB" stroke-width="2"/>
                <text font-weight="800" font-size="14" fill="#1D4ED8" x="300" y="36" text-anchor="middle">Planning Orchestrator</text>
            </g>

            <!-- Step 1: Data -->
            <line x1="500" y1="80" x2="500" y2="130" class="path-line path-on" marker-end="url(#arr-on)"/>
            <g id="ag-data" class="ag" style="transform:translate(200px, 140px)">
                <rect width="600" height="60" rx="10" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5"/>
                <text font-weight="700" font-size="12" fill="#374151" x="300" y="35" text-anchor="middle">Data Layer Agent</text>
            </g>

            <!-- Step 2: Brief & Plan (Parallel) -->
            <path d="M500 200 V230 H250 V260" class="path-line path-on" marker-end="url(#arr-on)"/>
            <path d="M500 200 V230 H750 V260" class="path-line path-on" marker-end="url(#arr-on)"/>
            
            <g id="ag-brief" class="ag" style="transform:translate(100px, 270px)">
                <rect width="300" height="80" rx="10" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5"/>
                <text font-weight="700" font-size="12" fill="#374151" x="150" y="45" text-anchor="middle">Context Briefing Agent</text>
            </g>
            <g id="ag-callplan" class="ag" style="transform:translate(600px, 270px)">
                <rect width="300" height="80" rx="10" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5"/>
                <text font-weight="700" font-size="12" fill="#374151" x="150" y="45" text-anchor="middle">Call Planning Agent</text>
            </g>

            <!-- Step 3: Validation -->
            <path d="M250 350 V380 H500 V410" class="path-line path-on" marker-end="url(#arr-on)"/>
            <path d="M750 350 V380 H500 V410" class="path-line path-on" marker-end="url(#arr-on)"/>
            
            <g id="ag-valid" class="ag" style="transform:translate(200px, 420px)">
                <rect width="600" height="60" rx="10" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5"/>
                <text font-weight="700" font-size="12" fill="#374151" x="300" y="35" text-anchor="middle">Validation Agent</text>
            </g>

            <!-- Step 4: Formatting -->
            <line x1="500" y1="480" x2="500" y2="520" class="path-line path-on" marker-end="url(#arr-on)"/>
            <g id="ag-fmt" class="ag" style="transform:translate(200px, 530px)">
                <rect width="600" height="60" rx="10" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5"/>
                <text font-weight="700" font-size="12" fill="#374151" x="300" y="35" text-anchor="middle">Formatting Agent</text>
            </g>
        </svg>
    </div>
    <div class="data-pane">
        <div class="tabs"><div class="tab active" data-target="logs">EXECUTION LOGS</div><div class="tab" data-target="resp">PLANNING PACKAGES</div></div>
        <div id="logs" class="pane-content active"></div>
        <div id="resp" class="pane-content"></div>
    </div>
</main>

<script>
    const logs=document.getElementById('logs'), resp=document.getElementById('resp'), tabs=document.querySelectorAll('.tab'), panes=document.querySelectorAll('.pane-content');
    let planningData = [];

    tabs.forEach(t=>{ t.onclick=()=>{ tabs.forEach(x=>x.classList.remove('active')); panes.forEach(x=>x.classList.remove('active')); t.classList.add('active'); document.getElementById(t.dataset.target).classList.add('active'); }});

    function updStatus(id,s){ 
        const n=document.getElementById(id); if(!n)return; 
        if(s==='START') n.classList.add('ag-active');
        else if(s==='END') { n.classList.remove('ag-active'); n.classList.add('ag-completed'); }
    }

    const typeWriter = (el, text, speed=15) => {
        return new Promise(resolve => {
            let i = 0; el.innerHTML = "";
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); }
                else resolve();
            }
            type();
        });
    };

    let msgQueue = [];
    let isProcessing = false;
    let isPipelineDone = false;

    const processQueue = async () => {
        if (isProcessing || msgQueue.length === 0) return;
        isProcessing = true;
        while (msgQueue.length > 0) {
            const l = msgQueue.shift();
            const c=document.createElement('div'); c.className='trace-card'; 
            c.innerHTML=`<div class="trace-hdr"><div class="trace-status ${l.status==='START'?'active':(l.status==='END'?'done':'')}"></div><div class="trace-agent">${l.agent_name.toUpperCase()}</div></div><div class="trace-desc"></div>`;
            logs.appendChild(c); logs.scrollTop=logs.scrollHeight; 
            if(l.status === 'START') updStatus(l.agent_name, l.status);
            await typeWriter(c.querySelector('.trace-desc'), l.message);
            if(l.status === 'END') updStatus(l.agent_name, l.status);
        }
        isProcessing = false;
        if(isPipelineDone) { setTimeout(() => { tabs[1].click(); isPipelineDone = false; }, 1000); }
    };

    async function start(){
        isPipelineDone = false; logs.innerHTML=''; resp.innerHTML='';
        document.querySelectorAll('.ag').forEach(el=>el.classList.remove('ag-active','ag-completed'));
        const es=new EventSource('/events');
        es.onmessage=(e)=>{ msgQueue.push(JSON.parse(e.data)); processQueue(); };
        try {
            const r=await fetch('/run-planning',{method:'POST', body: JSON.stringify({}), headers:{'Content-Type':'application/json'}});
            const d=await r.json(); 
            // Wait for queue to clear then poll for results or assume done
            // Simulating result arrival
            setTimeout(async () => {
                // In real app, we might poll results. Here we assume completion.
                // We'll just fetch again if needed or mock results
                planningData = [/* will be filled by a real fetch in production */];
                // For the demo, let's assume the results are in the response
                // Actually, let's just render some mocks if the backend is purely async
                isPipelineDone = true;
                renderResults();
            }, 8000);
        } catch(e){ es.close(); }
    }

    function renderResults(){
        // Mocking results for demo if empty
        if(planningData.length === 0) {
            planningData = [
                {
                    account_name: "Nexus Capital EU",
                    brief_markdown: "### Account Snapshot\nNexus Capital is showing significant growth in the DE sector, with a 24% increase in AUM since the last fund launch.\n\n### Key Catalysts\nDetected a Tier-1 conference presence in Amsterdam indicating new GP engagement.",
                    objectives: [{objective: "Explore Q3 Platform expansion", rationale: "GP expansion signals"}],
                    agenda: [{step: 1, topic: "Current Portfolio Review", key_question: "How has the new DE mandate performed?"}]
                }
            ];
        }
        resp.innerHTML='';
        planningData.forEach(p=>{
            const card=document.createElement('div'); card.className='plan-card';
            card.innerHTML=`
                <div class="acc-name">${p.account_name}</div>
                <div class="section-hdr">Account Brief</div>
                <div class="brief-box">${p.brief_markdown.replace(/\n/g, '<br>')}</div>
                <div class="section-hdr">Call Objectives</div>
                ${p.objectives.map(o=>`<div class="obj-pill"><div class="obj-t">${o.objective}</div><div class="obj-r">${o.rationale}</div></div>`).join('')}
                <div class="section-hdr">Proposed Agenda</div>
                ${p.agenda.map(a=>`<div class="agenda-row"><div class="step-num">${a.step}</div><div><div class="step-topic">${a.topic}</div><div class="step-q">${a.key_question}</div></div></div>`).join('')}
            `;
            resp.appendChild(card);
        });
    }
</script>
</body>
</html>
